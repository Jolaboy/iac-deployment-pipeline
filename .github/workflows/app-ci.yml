name: Application CI (Jest + multi-stage container build)

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - '.github/workflows/app-ci.yml'
  pull_request:
    paths:
      - 'app/**'
      - '.github/workflows/app-ci.yml'

defaults:
  run:
    working-directory: app

jobs:
  test:
    name: Jest unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Jest
        run: npm test

  build:
    name: Multi-stage image build (layer cached)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GitHub Actions cache backend persists Docker layers between runs.
      # Unchanged dependency layers are restored instead of rebuilt, which is
      # what turns multi-minute cold builds into sub-minute warm builds.
      - name: Build image with layer caching
        uses: docker/build-push-action@v6
        with:
          context: app
          file: app/Dockerfile
          push: false
          load: true
          tags: platform-core-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
