name: Production IaC Platform Continuous Delivery

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-2

jobs:
  preflight:
    name: Detect AWS credentials
    runs-on: ubuntu-latest
    outputs:
      has_aws: ${{ steps.detect.outputs.has_aws }}
    steps:
      - name: Detect AWS_ROLE_TO_ASSUME secret
        id: detect
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        run: |
          if [ -n "$AWS_ROLE_TO_ASSUME" ]; then
            echo "has_aws=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_aws=false" >> "$GITHUB_OUTPUT"
            echo "::notice::AWS_ROLE_TO_ASSUME secret not set — running credential-free validation only (no plan/apply)."
          fi

  terraform:
    name: Terraform validate & plan
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Fmt
        working-directory: terraform
        run: terraform fmt -check

      - name: Configure AWS credentials using OIDC
        if: needs.preflight.outputs.has_aws == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init (with backend)
        if: needs.preflight.outputs.has_aws == 'true'
        working-directory: terraform
        run: terraform init -input=false

      - name: Terraform Init (no backend, validation only)
        if: needs.preflight.outputs.has_aws != 'true'
        working-directory: terraform
        run: terraform init -input=false -backend=false

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        if: needs.preflight.outputs.has_aws == 'true'
        working-directory: terraform
        run: terraform plan -out=plan.tfplan

      - name: Upload Plan artifact
        if: needs.preflight.outputs.has_aws == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform/plan.tfplan

  apply:
    name: Terraform Apply (manual gated)
    runs-on: ubuntu-latest
    needs: [ preflight, terraform ]
    if: needs.preflight.outputs.has_aws == 'true' && github.ref == 'refs/heads/main'
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: terraform

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -input=false plan.tfplan
